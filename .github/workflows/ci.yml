name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    # Arch container: this is an Arch-targeted app (PKGBUILD installs it) and
    # the Qt6 + KDE Frameworks 6 build deps match the target system exactly.
    container: archlinux:latest
    timeout-minutes: 30
    steps:
      # Package downloads are the slowest cold phase; restore last run's
      # pacman cache (always saved fresh via the run_id key + prefix restore,
      # so package upgrades accumulate instead of going stale).
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: /var/cache/pacman/pkg
          key: pacman-${{ github.run_id }}
          restore-keys: |
            pacman-
      - run: pacman -Syu --noconfirm base-devel rust cargo-llvm-cov llvm qt6-base qt6-declarative kio kservice kcoreaddons pkgconf git
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Caches the cargo registry and target/ keyed on Cargo.lock + rustc
      # version, sparing the two cold compiles (clippy and llvm-cov) when
      # dependencies are unchanged.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      # Runs the test suite under coverage instrumentation. The ignore regex
      # mirrors the runtime-bound exemptions documented in CLAUDE.md
      # (Engineering Standard); the threshold only ratchets upward.
      - run: LLVM_COV=/usr/bin/llvm-cov LLVM_PROFDATA=/usr/bin/llvm-profdata cargo llvm-cov --summary-only --fail-under-lines 70 --ignore-filename-regex '(bridge/|main\.rs|ipc\.rs|toggle\.rs|context_menu\.rs|system_tray\.rs|file_opener\.rs|watcher\.rs|integrity\.rs)'

  # Aggregate gate so branch protection can target a single check.
  ci-ok:
    needs: [checks]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: echo ok
